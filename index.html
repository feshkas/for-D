<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 23 февраля, любимый! 💙</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ГЛОБАЛЬНЫЙ ФОН САЙТА */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            background-color: #e3f2fd;
            background-image: url('https://i.pinimg.com/originals/f3/2d/2f/f32d2f7395ed5e84a65d0ccf84e527fe.jpg'); /* Можно заменить на свою */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: #2c3e50;
        }

        /* АНИМАЦИЯ СЗАДИ КАРТОЧКИ */
        #animations {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .floating-icon {
            position: absolute;
            font-size: 24px;
            animation: floatUp 5s linear forwards;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.8));
            opacity: 0.6;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        /* КАРТОЧКА */
        .card-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(33, 150, 243, 0.2);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(8px);
        }

        .screen {
            display: none;
            animation: fadeIn 0.6s ease-out;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: 28px;
            color: #1565c0;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        p {
            font-size: 16px;
            margin-bottom: 20px;
            color: #546e7a;
            line-height: 1.5;
        }

        .img-wrapper {
            width: 100%;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
        }

        .img-wrapper img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background-color: #f1f9ff;
        }

        .img-round {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50% !important;
        }

        /* КНОПКИ */
        .btn {
            background: #42a5f5;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
            font-family: 'Nunito', sans-serif;
        }

        .btn:hover {
            background: #1e88e5;
            transform: scale(1.05);
        }

        .btn-outline {
            background: transparent;
            color: #1976d2;
            border: 2px solid #90caf9;
            padding: 8px 20px;
            font-size: 14px;
            margin-top: 15px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

    <div id="animations"></div>

    <div class="card-container">

        <div class="screen active" id="screen1">
            <div class="img-wrapper">
                <img src="https://i.pinimg.com/736x/d2/07/af/d207afde8bd68dea51a62ffb6c42f531.jpg" alt="Поздравление" style="width: 250px;">
            </div>
            <h1>С 23 февраля, любимыйй!★</h1>
            <p style="font-size: 14px;">Нажми на кнопку "Далее!!( ﾉ^ω^)ﾉ"</p>
            <button class="btn" onclick="showScreen('screen2')">Далее!! ( ﾉ^ω^)ﾉ</button>
        </div>

        <div class="screen" id="screen2">
            <div class="img-wrapper">
                <img src="https://i.pinimg.com/736x/a7/31/0f/a7310f84a9147b8b47eae4c2bc5eefb0.jpg" alt="Котик" class="img-round">
            </div>
            <div class="img-wrapper">
                <img src="https://i.pinimg.com/736x/53/2d/2f/532d2f7395ed5e84a65d0ccf84e527fe.jpg" alt="Письмо" style="width: 180px;">
            </div>
            <h1>откроешь письмо?＼(◎o◎)／</h1>
            <div class="btn-group">
                <button class="btn" onclick="showScreen('screen4')">конечно!!＼(^_^)／</button>
                <button class="btn" style="background: #b0bec5;" onclick="showScreen('screen3')">нетт (эм..)</button>
            </div>
            <button class="btn btn-outline" onclick="showScreen('screen1')">вернуться назад •♡•</button>
        </div>

        <div class="screen" id="screen3">
            <div class="img-wrapper">
                <img src="https://i.pinimg.com/736x/dd/67/6d/dd676ddfeb34ed8e3ea9ea056c25c6a1.jpg" alt="Почему нет?" style="width: 200px;">
            </div>
            <h1>почему?? подумай лучше.</h1>
            <button class="btn btn-outline" onclick="showScreen('screen2')">вернуться назад •♡•</button>
        </div>

        <div class="screen" id="screen4">
            <div class="img-wrapper">
                <img src="https://i.pinimg.com/736x/4f/9e/c6/4f9ec6e8859925c28a1458d59feceeff.jpg" alt="Любовь" style="width: 250px;">
            </div>
            <h1>Мой самый любимый мальчик, с 23 февраля!</h1>
            <p>
                Желаю тебе уверенности в себе, крутых идей и чтобы всё, что ты задумал, получалось. Я всегда рядом и всегда поддержу. Ты лучший!
            </p>
            <button class="btn btn-outline" onclick="showScreen('screen2')">вернуться назад •♡•</button>
        </div>

    </div>

    <script>
        function showScreen(screenId) {
            const screens = document.querySelectorAll('.screen');
            screens.forEach(screen => screen.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function createFloatingIcon() {
            const container = document.getElementById('animations');
            const icon = document.createElement('div');
            icon.classList.add('floating-icon');
            const icons = ['💙', '✨', '💎', '💠', '🌟'];
            icon.innerText = icons[Math.floor(Math.random() * icons.length)];
            icon.style.left = Math.random() * 100 + 'vw';
            const duration = Math.random() * 3 + 4;
            icon.style.animationDuration = duration + 's';
            container.appendChild(icon);
            setTimeout(() => { icon.remove(); }, duration * 1000);
        }
        setInterval(createFloatingIcon, 450);
    </script>
</body>
</html>
